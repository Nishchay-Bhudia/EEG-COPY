<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 560" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6B6B6B"/>
    </marker>
    <marker id="arrowRet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C68A8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="560" fill="#FFFFFF"/>
  <text x="34" y="40" font-size="22" font-weight="700" fill="#1A1A19">meditation-analyser · architecture</text>
  <text x="34" y="62" font-size="13" fill="#8A8A87">Headband → browser (acquire + orchestrate) → stateless analyser + stateful control-hub backend</text>

  <!-- ── Headband (device) ── -->
  <rect x="34" y="250" width="150" height="96" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="109" y="286" font-size="13" font-weight="700" fill="#1E1B4B" text-anchor="middle">🧠 EEG headband</text>
  <text x="109" y="306" font-size="11" fill="#3949AB" text-anchor="middle">Muse S · BrainBit</text>
  <text x="109" y="324" font-size="11" fill="#3949AB" text-anchor="middle">4-ch · 250–256 Hz</text>

  <!-- ── Browser container (ui) ── -->
  <rect x="228" y="86" width="252" height="404" rx="14" fill="#FFF6F1" stroke="#D97757" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="246" y="110" font-size="13" font-weight="700" fill="#8A3D1E">🖥️ BROWSER · eeg-ui frontend</text>

  <rect x="250" y="128" width="208" height="80" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.4"/>
  <text x="354" y="160" font-size="13" font-weight="700" fill="#3A1D12" text-anchor="middle">Web Bluetooth driver</text>
  <text x="354" y="180" font-size="11" fill="#8A5238" text-anchor="middle">Muse · BrainBit adapters</text>
  <text x="354" y="196" font-size="11" fill="#8A5238" text-anchor="middle">→ normalized µV</text>

  <rect x="250" y="232" width="208" height="74" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.4"/>
  <text x="354" y="264" font-size="13" font-weight="700" fill="#3A1D12" text-anchor="middle">Epoch collector</text>
  <text x="354" y="284" font-size="11" fill="#8A5238" text-anchor="middle">~4 s window · 4 channels</text>

  <rect x="250" y="330" width="208" height="146" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.4"/>
  <text x="354" y="360" font-size="13" font-weight="700" fill="#3A1D12" text-anchor="middle">Control-hub views</text>
  <text x="354" y="384" font-size="11" fill="#8A5238" text-anchor="middle">Monitor · Cohort · Client</text>
  <text x="354" y="402" font-size="11" fill="#8A5238" text-anchor="middle">Analyze · Replay</text>
  <text x="354" y="420" font-size="11" fill="#8A5238" text-anchor="middle">Prescribe</text>
  <text x="354" y="452" font-size="10" fill="#B0704F" text-anchor="middle" font-style="italic">local FFT fallback if</text>
  <text x="354" y="466" font-size="10" fill="#B0704F" text-anchor="middle" font-style="italic">analyser unreachable</text>

  <!-- ── .NET analyser container (net) ── -->
  <rect x="560" y="80" width="360" height="238" rx="14" fill="#F4F1FA" stroke="#7C68A8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="578" y="104" font-size="13" font-weight="700" fill="#4A3A78">⚙️ eeg-backend · Neuro-Yogic (.NET 8)</text>

  <rect x="580" y="120" width="320" height="60" rx="10" fill="#FFFFFF" stroke="#7C68A8" stroke-width="1.4"/>
  <text x="740" y="145" font-size="13" font-weight="700" fill="#241640" text-anchor="middle">ASP.NET Core API</text>
  <text x="740" y="165" font-size="10.5" fill="#5B4A8A" text-anchor="middle">POST /analyze · /analyze/bands · SignalR /hubs/eeg · JWT</text>

  <rect x="580" y="196" width="155" height="56" rx="10" fill="#FFFFFF" stroke="#7C68A8" stroke-width="1.4"/>
  <text x="657" y="220" font-size="12" font-weight="700" fill="#241640" text-anchor="middle">SignalProcessing</text>
  <text x="657" y="238" font-size="10.5" fill="#5B4A8A" text-anchor="middle">FFT · band power</text>

  <rect x="745" y="196" width="155" height="56" rx="10" fill="#FFFFFF" stroke="#7C68A8" stroke-width="1.4"/>
  <text x="822" y="220" font-size="12" font-weight="700" fill="#241640" text-anchor="middle">Analysis</text>
  <text x="822" y="238" font-size="10.5" fill="#5B4A8A" text-anchor="middle">Bhūmi · Guṇa · Svara</text>

  <rect x="580" y="266" width="320" height="40" rx="8" fill="#FBF6EC" stroke="#C9A84C" stroke-width="1.4"/>
  <text x="740" y="291" font-size="11.5" font-weight="600" fill="#3A2E0E" text-anchor="middle">🗄️ SQLite · neuroyogic.db</text>

  <!-- ── eeg-ui backend container (srv) ── -->
  <rect x="560" y="350" width="360" height="168" rx="14" fill="#F0FAF4" stroke="#56A67A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="578" y="374" font-size="13" font-weight="700" fill="#2E6B4A">☁️ eeg-ui backend · Vercel</text>

  <rect x="580" y="390" width="320" height="62" rx="10" fill="#FFFFFF" stroke="#56A67A" stroke-width="1.4"/>
  <text x="740" y="414" font-size="13" font-weight="700" fill="#0F2E1E" text-anchor="middle">Express API · /api</text>
  <text x="740" y="434" font-size="10.5" fill="#3A6B52" text-anchor="middle">auth · sessions · epochs · clients · ai</text>

  <rect x="580" y="466" width="320" height="40" rx="8" fill="#FBF6EC" stroke="#C9A84C" stroke-width="1.4"/>
  <text x="740" y="491" font-size="11.5" font-weight="600" fill="#3A2E0E" text-anchor="middle">🗄️ Supabase Postgres · users · clients · sessions · epochs</text>

  <!-- ── GROQ (ext) ── -->
  <rect x="970" y="398" width="196" height="72" rx="12" fill="#FDF0F0" stroke="#C75C5C" stroke-width="1.5"/>
  <text x="1068" y="430" font-size="13" font-weight="700" fill="#3A1212" text-anchor="middle">🤖 GROQ LLM</text>
  <text x="1068" y="450" font-size="11" fill="#8A3A3A" text-anchor="middle">AI Baba · Prescribe</text>

  <!-- ── Arrows ── -->
  <!-- headband → driver -->
  <line x1="184" y1="286" x2="248" y2="180" stroke="#6B6B6B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="196" y="222" font-size="10.5" fill="#5A5A57" transform="rotate(-34 196 222)">BLE (Web Bluetooth)</text>

  <!-- collector → analyser API (request) -->
  <line x1="460" y1="250" x2="578" y2="150" stroke="#6B6B6B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="470" y="196" font-size="10.5" fill="#5A5A57" transform="rotate(-27 470 196)">POST /analyze · epoch</text>

  <!-- analyser → collector (response) -->
  <path d="M578,168 C520,200 500,250 460,278" fill="none" stroke="#7C68A8" stroke-width="1.6" stroke-dasharray="1 0" marker-end="url(#arrowRet)"/>
  <text x="474" y="250" font-size="10" fill="#6A55A0" transform="rotate(26 474 250)">Bhūmi · Guṇa · Svara</text>

  <!-- collector → express (persist) -->
  <line x1="460" y1="286" x2="578" y2="404" stroke="#6B6B6B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="466" y="352" font-size="10.5" fill="#5A5A57" transform="rotate(32 466 352)">POST /sessions/:id/epoch</text>

  <!-- views → express (rest) -->
  <line x1="460" y1="418" x2="578" y2="424" stroke="#6B6B6B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="474" y="438" font-size="10.5" fill="#5A5A57">REST /api/*</text>

  <!-- express → groq -->
  <line x1="900" y1="424" x2="968" y2="430" stroke="#6B6B6B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="906" y="418" font-size="10.5" fill="#5A5A57">/ai/*</text>
</svg>
