name: Deploy

# Deploys to Render after CI succeeds on main. The consolidated service is
# deployed by POSTing to its Render "Deploy Hook" URL, stored as a repo secret:
#   RENDER_DEPLOY_HOOK   — the neuro-yogic service (API + SPA in one image)
# A missing hook is skipped (not an error). Create it in Render:
# Service → Settings → Deploy Hook.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    # Only when CI passed (workflow_run), or when triggered manually.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy (API + SPA, one service)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering deploy…"
            curl -fsSL -X POST "$HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping."
          fi
